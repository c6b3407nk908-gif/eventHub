<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub - Edit Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20 gap-4">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='home_page.html'">
                    <svg class="h-8 w-8 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span class="ml-2 text-xl font-bold tracking-tight text-slate-900 dark:text-white">EventHub <span class="text-sm font-medium text-slate-500 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded ml-2">Edit Mode</span></span>
                </div>
                
                <!-- Actions -->
                <div class="flex space-x-3">
                    <button type="button" id="cancelBtn" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Cancel
                    </button>
                    <button type="button" id="saveBtn" class="px-4 py-2 bg-brand-600 text-white rounded-lg text-sm font-medium hover:bg-brand-700 transition-colors shadow-sm flex items-center">
                        <span id="saveBtnText">Save Changes</span>
                        <svg id="saveSpinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
        
        <div id="loading" class="text-center py-20">
            <svg class="animate-spin mx-auto h-8 w-8 text-brand-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-4 text-slate-500">Loading event editor...</p>
        </div>

        <form id="editEventForm" class="hidden">
            <!-- Hero Banner -->
            <div class="w-full h-64 sm:h-80 md:h-96 rounded-3xl overflow-hidden relative mb-8 shadow-md group">
                <img id="eventHeroImage" src="https://via.placeholder.com/1200x600" alt="Event Banner" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-slate-900/20"></div>
                
                <!-- Image Upload Overlay -->
                <label for="imageUpload" class="absolute top-4 right-4 bg-white/20 hover:bg-white/30 backdrop-blur-md border border-white/40 text-white px-4 py-2 rounded-lg cursor-pointer transition-colors flex items-center shadow-sm">
                    <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Change Cover Image
                </label>
                <input type="file" id="imageUpload" class="hidden" accept="image/*">

                <div class="absolute bottom-0 left-0 p-6 sm:p-10 w-full max-w-4xl">
                    <input type="text" id="eventCategory" required class="inline-block px-3 py-1 bg-brand-600/80 border border-brand-400 text-white text-xs font-bold uppercase tracking-wider rounded-md mb-3 focus:outline-none focus:ring-2 focus:ring-white focus:bg-brand-600 placeholder-white/70" placeholder="e.g. Technology, Music...">
                    <input type="text" id="eventTitle" required class="block w-full bg-transparent border-b-2 border-dashed border-white/40 focus:border-white focus:outline-none text-3xl sm:text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-2 placeholder-white/50 pb-1" placeholder="Enter Event Title">
                    <p class="text-slate-300 text-sm mt-2 italic">Note: The event description handles the subtitle on the public page.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Left Column: Details & Opportunities -->
                <div class="lg:col-span-2 space-y-10">
                    
                    <!-- About Section -->
                    <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 sm:p-8 shadow-sm border border-slate-200 dark:border-slate-700">
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-4">About this event</h2>
                        <textarea id="eventDescription" required rows="10" class="block w-full rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 p-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-base leading-relaxed resize-y shadow-inner" placeholder="Write a detailed description of what attendees can expect..."></textarea>
                    </section>

                    <!-- Opportunities Management Callout -->
                    <section class="bg-brand-50 dark:bg-brand-900/20 rounded-2xl p-6 sm:p-8 border border-brand-100 dark:border-brand-800/50 flex flex-col sm:flex-row items-center justify-between gap-6">
                        <div>
                            <h3 class="text-xl font-bold text-brand-900 dark:text-brand-100">Jobs & Sponsorships</h3>
                            <p class="text-brand-700 dark:text-brand-300 mt-1 text-sm">Need to add or modify hiring roles or sponsorship packages for this event?</p>
                        </div>
                        <button type="button" id="manageOppBtn" class="flex-shrink-0 px-5 py-2.5 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 dark:focus:ring-offset-slate-800 whitespace-nowrap">
                            Manage Opportunities
                        </button>
                    </section>

                    <!-- Opportunities Section: Jobs -->
                    <section id="jobsSection" class="hidden bg-white dark:bg-slate-800 rounded-2xl p-6 sm:p-8 shadow-sm border border-slate-200 dark:border-slate-700">
                        <div class="flex items-center justify-between mb-6">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center">
                                    <svg class="h-6 w-6 mr-2 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 14h.01M9 14h.01" />
                                    </svg>
                                    Job Roles
                                </h2>
                            </div>
                        </div>
                        <div class="space-y-4" id="jobList"></div>
                    </section>

                    <!-- Opportunities Section: Sponsorships -->
                    <section id="sponsorSection" class="hidden bg-white dark:bg-slate-800 rounded-2xl p-6 sm:p-8 shadow-sm border border-slate-200 dark:border-slate-700">
                        <div class="flex items-center justify-between mb-6">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center">
                                    <svg class="h-6 w-6 mr-2 text-yellow-500 dark:text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                    </svg>
                                    Sponsorship Packages
                                </h2>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="sponsorList"></div>
                    </section>
                </div>

                <!-- Right Column: Sticky Quick Facts -->
                <div class="lg:col-span-1">
                    <div class="sticky top-28 bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
                        
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-6">Quick Facts</h3>
                        
                        <div class="space-y-6">
                            <!-- Date & Time -->
                            <div class="flex items-start">
                                <div class="flex-shrink-0 mt-1 bg-brand-50 dark:bg-brand-900/30 p-2 rounded-lg">
                                    <svg class="h-6 w-6 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <div class="ml-4 w-full">
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Date</label>
                                    <input type="date" id="eventDate" required class="block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-brand-500 focus:border-brand-500 mb-3">
                                    
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Time</label>
                                    <input type="time" id="eventTime" required class="block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-brand-500 focus:border-brand-500">
                                </div>
                            </div>

                            <!-- Location -->
                            <div class="flex items-start">
                                <div class="flex-shrink-0 mt-1 bg-brand-50 dark:bg-brand-900/30 p-2 rounded-lg">
                                    <svg class="h-6 w-6 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </div>
                                <div class="ml-4 w-full">
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Location</label>
                                    <select id="eventLocation" required class="block w-full rounded-md border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-brand-500 focus:border-brand-500 appearance-none cursor-pointer">
                                        <option value="" disabled selected>Select a location...</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                </div>

            </div>
        </form>
    </main>

    <script src="locations.js"></script>
    <script>
        const API_URL = "http://localhost:5000/api/events";
        let currentEvent = null;
        let eventId = null;

        // Load locations for select
        const select = document.getElementById('eventLocation');
        if (typeof LOCATIONS !== 'undefined') {
            LOCATIONS.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc;
                option.textContent = loc;
                select.appendChild(option);
            });
            
            // If event details already loaded before locations, update it
            if (currentEvent && currentEvent.location) {
                select.value = currentEvent.location;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const eventDateInput = document.getElementById('eventDate');
            if (eventDateInput) {
                const today = new Date().toISOString().split('T')[0];
                eventDateInput.min = today;
                eventDateInput.max = "9999-12-31";
            }

            const params = new URLSearchParams(window.location.search);
            eventId = params.get('id');
            
            if (!eventId) {
                window.location.href = 'profile_page.html';
                return;
            }

            // Image upload preview
            document.getElementById('imageUpload').addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('eventHeroImage').src = e.target.result;
                    }
                    reader.readAsDataURL(this.files[0]);
                }
            });

            document.getElementById('cancelBtn').addEventListener('click', () => {
                window.location.href = `event_details.html?id=${eventId}`;
            });

            document.getElementById('manageOppBtn').addEventListener('click', () => {
                window.location.href = `add_opportunities.html?id=${eventId}`;
            });

            document.getElementById('saveBtn').addEventListener('click', saveEvent);

            fetchEventDetails();
        });

        async function fetchEventDetails() {
            try {
                const response = await fetch(`${API_URL}/${eventId}`);
                if (!response.ok) throw new Error('Event not found');
                
                currentEvent = await response.json();
                
                // Populate inputs
                if (currentEvent.imageUrl) {
                    document.getElementById('eventHeroImage').src = currentEvent.imageUrl;
                }
                document.getElementById('eventTitle').value = currentEvent.eventName || '';
                document.getElementById('eventCategory').value = currentEvent.eventType || '';
                document.getElementById('eventDescription').value = currentEvent.description || '';
                
                if (currentEvent.eventDate) {
                    document.getElementById('eventDate').value = currentEvent.eventDate.split('T')[0];
                }
                document.getElementById('eventTime').value = currentEvent.eventTime || '';
                document.getElementById('eventLocation').value = currentEvent.location || '';

                // Render Jobs
                if (currentEvent.jobs && currentEvent.jobs.length > 0) {
                    document.getElementById('jobsSection').classList.remove('hidden');
                    const jobList = document.getElementById('jobList');
                    currentEvent.jobs.forEach(job => {
                        jobList.innerHTML += `
                            <div class="bg-slate-50 dark:bg-slate-700/50 rounded-xl p-5 border border-slate-100 dark:border-slate-600/50">
                                <h3 class="text-lg font-bold text-slate-900 dark:text-white">${job.roleTitle}</h3>
                                <p class="text-brand-600 dark:text-brand-400 text-sm font-medium mt-1">${job.jobType} • ${job.compensation}</p>
                                <p class="text-slate-600 dark:text-slate-300 text-sm mt-3 leading-relaxed">${job.roleDescription}</p>
                            </div>
                        `;
                    });
                }

                // Render Sponsorships
                if (currentEvent.sponsorships && currentEvent.sponsorships.length > 0) {
                    document.getElementById('sponsorSection').classList.remove('hidden');
                    const sponsorList = document.getElementById('sponsorList');
                    currentEvent.sponsorships.forEach(pack => {
                        sponsorList.innerHTML += `
                            <div class="bg-gradient-to-br from-yellow-50 to-orange-50 dark:from-yellow-900/20 dark:to-orange-900/20 rounded-xl p-5 border border-yellow-200/50 dark:border-yellow-700/30">
                                <h3 class="text-lg font-bold text-slate-900 dark:text-white">${pack.packageName}</h3>
                                <p class="text-2xl font-black text-yellow-600 dark:text-yellow-500 mt-2">₹${pack.packagePrice}</p>
                                <p class="text-slate-600 dark:text-slate-300 text-sm mt-3 leading-relaxed">${pack.packagePerks}</p>
                            </div>
                        `;
                    });
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('editEventForm').classList.remove('hidden');

            } catch (error) {
                alert("Error loading event. Are you sure you're the owner?");
                window.location.href = 'profile_page.html';
            }
        }

        async function saveEvent() {
            // Basic validation
            const form = document.getElementById('editEventForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btnText = document.getElementById('saveBtnText');
            const btnSpinner = document.getElementById('saveSpinner');
            const saveBtn = document.getElementById('saveBtn');

            saveBtn.disabled = true;
            btnText.textContent = 'Saving...';
            btnSpinner.classList.remove('hidden');

            const formData = new FormData();
            formData.append('eventName', document.getElementById('eventTitle').value);
            formData.append('eventType', document.getElementById('eventCategory').value);
            formData.append('description', document.getElementById('eventDescription').value);
            formData.append('eventDate', document.getElementById('eventDate').value);
            formData.append('eventTime', document.getElementById('eventTime').value);
            formData.append('location', document.getElementById('eventLocation').value);

            const fileInput = document.getElementById('imageUpload');
            if (fileInput.files.length > 0) {
                formData.append('image', fileInput.files[0]);
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/${eventId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });

                if (response.ok) {
                    // Redirect back to standard details view
                    window.location.href = `event_details.html?id=${eventId}`;
                } else {
                    throw new Error('Failed to update event');
                }
            } catch (error) {
                alert('Error updating event: ' + error.message);
                saveBtn.disabled = false;
                btnText.textContent = 'Save Changes';
                btnSpinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
