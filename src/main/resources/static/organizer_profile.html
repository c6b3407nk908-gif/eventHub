<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Organizer Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"Courier Prime"', 'monospace'],
          },
          colors: {
            background: '#fdf9f4',
            surface: '#ffffff',
            'surface-variant': '#e6e2dd',
            primary: '#a7332d',
            'primary-container': '#c84b43',
            secondary: '#456274',
            tertiary: '#7b550a',
            ink: '#1c1c19',
            'on-background': '#1c1c19',
            'on-surface-variant': '#58413f'
          },
          boxShadow: {
            'retro': '4px 4px 0px #1c1c19',
            'retro-hover': '2px 2px 0px #1c1c19',
            'retro-sm': '2px 2px 0px #1c1c19',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #fdf9f4; color: #1c1c19; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Bricolage Grotesque', sans-serif; }
    .label-stamp { font-family: 'Courier Prime', monospace; text-transform: uppercase; letter-spacing: 0.05em; font-weight: bold; }
    .btn-retro { border: 3px solid #1c1c19; box-shadow: 4px 4px 0px #1c1c19; transition: all 0.1s ease; }
    .btn-retro:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #1c1c19; }
    .btn-retro:active { transform: translate(4px, 4px); box-shadow: none; }
    .card-retro { border: 3px solid #1c1c19; box-shadow: 4px 4px 0px #1c1c19; transition: all 0.2s ease; }
    .card-retro:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1c1c19; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 12px; border-left: 3px solid #1c1c19; }
    ::-webkit-scrollbar-track { background: #fdf9f4; }
    ::-webkit-scrollbar-thumb { background: #1c1c19; border: 2px solid #fdf9f4; }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col transition-colors duration-300">

  <!-- Top Menu Bar -->
  <header class="sticky top-0 z-50 bg-surface border-b border-ink border-[3px] shadow-retro">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20 gap-4">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='home_page.html'">
          <svg class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <span class="ml-2 text-xl font-bold tracking-tight text-on-background">EventHub</span>
        </div>
        
        <!-- Back Button -->
        <button type="button" onclick="history.back()" class="text-sm font-medium text-on-surface-variant hover:text-slate-700 transition-colors flex items-center">
          <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
    
    <!-- Loading State -->
    <div id="loading" class="text-center py-20">
      <svg class="animate-spin mx-auto h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="mt-4 text-on-surface-variant">Loading organizer profile...</p>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden text-center py-20 text-red-500">
      <h2 class="text-2xl font-bold mb-2">Organizer Not Found</h2>
      <p>We couldn't retrieve details for this organizer.</p>
      <button onclick="window.location.href='home_page.html'" class="mt-6 px-4 py-2 bg-primary btn-retro text-white rounded-lg hover:bg-primary">Go Home</button>
    </div>

    <!-- Main Content -->
    <div id="profileContent" class="hidden space-y-12 animate-fade-in">
      
      <!-- Profile Header Neubrutalism Card -->
      <div class="bg-surface rounded-3xl p-6 sm:p-10 shadow-retro border border-ink border-[3px] flex flex-col md:flex-row gap-8 items-center md:items-start relative overflow-hidden">
        
        <!-- Large Avatar -->
        <div class="relative w-32 h-32 sm:w-40 sm:h-40 rounded-2xl overflow-hidden border border-ink border-[3px] shadow-retro-sm bg-background flex-shrink-0">
          <img id="organizerAvatar" src="" alt="Organizer Avatar" class="w-full h-full object-cover">
        </div>

        <!-- Details -->
        <div class="flex-grow space-y-4 text-center md:text-left">
          <span class="inline-block px-3 py-1 bg-yellow-400 text-ink text-xs font-bold uppercase tracking-wider rounded-md border border-ink border-[2px] shadow-retro-sm">
            Event Host
          </span>
          <h1 id="organizerName" class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-on-background tracking-tight"></h1>
          
          <div class="flex flex-col sm:flex-row sm:items-center gap-4 justify-center md:justify-start text-on-surface-variant font-medium">
            <span id="organizerEmail" class="flex items-center gap-1.5 justify-center">
              <svg class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <!-- email -->
            </span>
          </div>

          <!-- Overall Rating -->
          <div class="flex items-center gap-3 justify-center md:justify-start pt-2">
            <div id="orgRatingStars" class="flex text-yellow-400 text-2xl"></div>
            <span id="orgRatingNumber" class="text-xl font-extrabold text-on-background">0.0</span>
            <span id="orgRatingTotalCount" class="text-xs text-on-surface-variant">(0 reviews total)</span>
          </div>
        </div>

        <!-- Quick Stats Box -->
        <div class="grid grid-cols-2 gap-4 w-full md:w-auto md:min-w-[240px] pt-4 md:pt-0">
          <div class="bg-background border border-ink border-[3px] rounded-2xl p-4 text-center shadow-retro-sm">
            <p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant label-stamp">Hosted</p>
            <p id="statTotalEvents" class="text-3xl font-extrabold text-primary mt-1">0</p>
          </div>
          <div class="bg-background border border-ink border-[3px] rounded-2xl p-4 text-center shadow-retro-sm">
            <p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant label-stamp">Avg Rating</p>
            <p id="statAvgRating" class="text-3xl font-extrabold text-tertiary mt-1">0.0</p>
          </div>
        </div>
      </div>

      <!-- Events List Tabs -->
      <div class="space-y-6">
        <div class="border-b border-ink border-[3px] flex gap-2 pb-0 mb-6">
          <button id="tabUpcoming" onclick="switchTab('upcoming')" class="px-6 py-3 border-t border-x border-ink border-[3px] translate-y-[3px] bg-surface text-on-background font-bold text-base rounded-t-xl transition-all shadow-none">
            Upcoming Events (<span id="countUpcoming">0</span>)
          </button>
          <button id="tabPast" onclick="switchTab('past')" class="px-6 py-3 border-t border-x border-slate-300 border-[3px] translate-y-[3px] bg-slate-100 text-on-surface-variant font-bold text-base rounded-t-xl transition-all hover:bg-background">
            Past Events (<span id="countPast">0</span>)
          </button>
        </div>

        <!-- Upcoming Grid -->
        <div id="upcomingSection" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
          <!-- Upcoming Cards -->
        </div>

        <!-- Past Grid -->
        <div id="pastSection" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
          <!-- Past Cards -->
        </div>
      </div>
    </div>
  </main>

  <script>
    let organizerId = null;
    let upcomingEvents = [];
    let pastEvents = [];
    let currentTab = 'upcoming';

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      organizerId = params.get('id');

      if (!organizerId) {
        showError();
        return;
      }

      loadOrganizerData(organizerId);
    });

    async function loadOrganizerData(id) {
      try {
        // 1. Fetch user profile
        const userRes = await fetch(`http://localhost:5000/api/users/${id}`);
        if (!userRes.ok) throw new Error('Organizer not found');
        const organizer = await userRes.json();

        // 2. Fetch organizer events
        const eventsRes = await fetch(`http://localhost:5000/api/events/search?organizerId=${id}&size=100`);
        const eventsData = await eventsRes.json();
        const allEvents = eventsData.content || [];

        // 3. Fetch reviews for each event and calculate aggregate details
        let allFeedbacks = [];
        const eventsWithRatings = await Promise.all(
          allEvents.map(async (event) => {
            let avgRating = 0;
            let reviewsCount = 0;
            try {
              const feedbackRes = await fetch(`http://localhost:5000/api/feedbacks/event/${event.id}`);
              if (feedbackRes.ok) {
                const feedbacks = await feedbackRes.json();
                reviewsCount = feedbacks.length;
                if (reviewsCount > 0) {
                  const sum = feedbacks.reduce((acc, f) => acc + f.rating, 0);
                  avgRating = sum / reviewsCount;
                  allFeedbacks = allFeedbacks.concat(feedbacks);
                }
              }
            } catch (e) {
              console.error(`Error loading feedbacks for event ${event.id}`, e);
            }
            return {
              ...event,
              avgRating,
              reviewsCount
            };
          })
        );

        // Separate upcoming vs past events
        const now = new Date();
        upcomingEvents = [];
        pastEvents = [];

        eventsWithRatings.forEach(event => {
          if (event.status === 'completed') {
            pastEvents.push(event);
          } else {
            upcomingEvents.push(event);
          }
        });

        // Sort events by date
        upcomingEvents.sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate));
        pastEvents.sort((a, b) => new Date(b.eventDate) - new Date(a.eventDate)); // Past events sorted desc (newest first)

        // Calculate Overall Ratings
        let overallAvg = 0;
        if (allFeedbacks.length > 0) {
          const sum = allFeedbacks.reduce((acc, f) => acc + f.rating, 0);
          overallAvg = sum / allFeedbacks.length;
        }

        // Render UI
        renderOrganizerProfile(organizer, allEvents.length, overallAvg, allFeedbacks.length);
        renderEventsGrid();

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('profileContent').classList.remove('hidden');

      } catch (err) {
        console.error(err);
        showError();
      }
    }

    function renderOrganizerProfile(org, totalEvents, overallRating, totalReviews) {
      document.getElementById('organizerName').textContent = org.name || "Event Organizer";
      document.getElementById('organizerEmail').innerHTML = `
        <svg class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        ${org.email || "No email available"}
      `;

      if (org.profilePictureUrl) {
        document.getElementById('organizerAvatar').src = org.profilePictureUrl;
      } else {
        document.getElementById('organizerAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(org.name || 'Organizer')}&background=random&size=200`;
      }

      // Stats
      document.getElementById('statTotalEvents').textContent = totalEvents;
      document.getElementById('statAvgRating').textContent = overallRating > 0 ? overallRating.toFixed(1) : "0.0";
      
      // Star count details
      document.getElementById('orgRatingNumber').textContent = overallRating > 0 ? overallRating.toFixed(1) : "0.0";
      document.getElementById('orgRatingTotalCount').textContent = `(${totalReviews} review${totalReviews === 1 ? '' : 's'} total)`;

      const starsDiv = document.getElementById('orgRatingStars');
      starsDiv.innerHTML = '';
      const roundedAvg = Math.round(overallRating);
      for (let i = 1; i <= 5; i++) {
        if (i <= roundedAvg) {
          starsDiv.innerHTML += '★';
        } else {
          starsDiv.innerHTML += '☆';
        }
      }

      document.getElementById('countUpcoming').textContent = upcomingEvents.length;
      document.getElementById('countPast').textContent = pastEvents.length;
    }

    function renderEventsGrid() {
      const upcomingGrid = document.getElementById('upcomingSection');
      const pastGrid = document.getElementById('pastSection');

      upcomingGrid.innerHTML = '';
      pastGrid.innerHTML = '';

      // Render Upcoming
      if (upcomingEvents.length === 0) {
        upcomingGrid.innerHTML = `
          <div class="col-span-full text-center py-12 text-on-surface-variant font-medium bg-surface rounded-2xl border border-ink border-[3px] shadow-retro-sm">
            No upcoming events listed by this organizer.
          </div>
        `;
      } else {
        upcomingEvents.forEach(event => {
          upcomingGrid.appendChild(createEventCard(event));
        });
      }

      // Render Past
      if (pastEvents.length === 0) {
        pastGrid.innerHTML = `
          <div class="col-span-full text-center py-12 text-on-surface-variant font-medium bg-surface rounded-2xl border border-ink border-[3px] shadow-retro-sm">
            No past events listed by this organizer.
          </div>
        `;
      } else {
        pastEvents.forEach(event => {
          pastGrid.appendChild(createEventCard(event));
        });
      }
    }

    function createEventCard(event) {
      const card = document.createElement('div');
      card.className = 'bg-surface card-retro rounded-xl overflow-hidden group cursor-pointer flex flex-col h-full';
      card.onclick = () => window.location.href = `event_details.html?id=${event.id}`;

      const dateObj = new Date(event.eventDate);
      const month = dateObj.toLocaleString('default', { month: 'short' });
      const day = dateObj.getDate();

      let statusBadgeHTML = '';
      if (event.status === 'coming') {
        statusBadgeHTML = `
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-emerald-500/10 text-emerald-600 border border-emerald-500/20 backdrop-blur-sm absolute top-4 right-4 z-10 shadow-retro">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            Coming
          </span>
        `;
      } else if (event.status === 'ongoing') {
        statusBadgeHTML = `
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-primary/10 text-primary border border-primary/20 backdrop-blur-sm absolute top-4 right-4 z-10 shadow-retro animate-pulse">
            <span class="w-1.5 h-1.5 rounded-full bg-primary animate-ping"></span>
            Ongoing
          </span>
        `;
      } else if (event.status === 'completed') {
        statusBadgeHTML = `
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-slate-500/10 text-on-surface-variant border border-slate-500/20 backdrop-blur-sm absolute top-4 right-4 z-10 shadow-retro">
            <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
            Completed
          </span>
        `;
      }

      // Stars rating HTML
      let starsHTML = 'No reviews';
      if (event.reviewsCount > 0) {
        starsHTML = `
          <span class="text-yellow-400 font-bold">★ ${event.avgRating.toFixed(1)}</span>
          <span class="text-xs text-on-surface-variant">(${event.reviewsCount} review${event.reviewsCount === 1 ? '' : 's'})</span>
        `;
      }

      card.innerHTML = `
        <div class="relative h-48 overflow-hidden flex-shrink-0">
          <img src="${event.imageUrl || 'https://via.placeholder.com/800x400'}" alt="${event.eventName}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
          ${statusBadgeHTML}
          <div class="absolute top-4 left-4 bg-surface/90 backdrop-blur-sm px-3 py-1 btn-retro rounded-md shadow-retro text-center">
            <span class="block text-xs font-bold text-primary uppercase leading-tight">${month}</span>
            <span class="block text-lg font-bold text-on-background leading-none">${day}</span>
          </div>
        </div>
        <div class="p-5 flex flex-col flex-grow justify-between">
          <div>
            <div class="flex items-center justify-between gap-2 mb-2">
              <span class="text-xs font-semibold text-primary tracking-wider uppercase block truncate">${(event.category || event.eventType || '').replace(/_/g, ' ')}</span>
              <div class="flex items-center gap-1">${starsHTML}</div>
            </div>
            <h3 class="text-lg font-bold text-on-background mb-1 truncate group-hover:text-primary transition-colors flex items-center gap-1.5 pr-2">
              ${event.eventName}
              ${event.verified ? `<svg class="w-5 h-5 text-blue-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" title="Verified Event"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>` : ''}
            </h3>
            <p class="text-on-surface-variant text-sm mb-4 line-clamp-2">${event.description}</p>
          </div>
          <div class="flex items-center text-sm text-on-surface-variant pt-2 border-t border-slate-100 flex-shrink-0">
            <svg class="h-4 w-4 mr-1.5 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            </svg>
            <span class="truncate">${event.location}</span>
          </div>
        </div>
      `;

      return card;
    }

    function switchTab(tab) {
      if (tab === currentTab) return;
      currentTab = tab;

      const tabUp = document.getElementById('tabUpcoming');
      const tabPa = document.getElementById('tabPast');
      const secUp = document.getElementById('upcomingSection');
      const secPa = document.getElementById('pastSection');

      if (tab === 'upcoming') {
        tabUp.className = "px-6 py-3 border-t border-x border-ink border-[3px] translate-y-[3px] bg-surface text-on-background font-bold text-base rounded-t-xl transition-all shadow-none";
        tabPa.className = "px-6 py-3 border-t border-x border-slate-300 border-[3px] translate-y-[3px] bg-slate-100 text-on-surface-variant font-bold text-base rounded-t-xl transition-all hover:bg-background";
        secUp.classList.remove('hidden');
        secPa.classList.add('hidden');
      } else {
        tabPa.className = "px-6 py-3 border-t border-x border-ink border-[3px] translate-y-[3px] bg-surface text-on-background font-bold text-base rounded-t-xl transition-all shadow-none";
        tabUp.className = "px-6 py-3 border-t border-x border-slate-300 border-[3px] translate-y-[3px] bg-slate-100 text-on-surface-variant font-bold text-base rounded-t-xl transition-all hover:bg-background";
        secPa.classList.remove('hidden');
        secUp.classList.add('hidden');
      }
    }

    function showError() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }
  </script>
</body>
</html>
