<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Verify Email - EventHub</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
 tailwind.config = {
 theme: {
 extend: {
 fontFamily: {
 display: ['"Bricolage Grotesque"', 'sans-serif'],
 body: ['"DM Sans"', 'sans-serif'],
 mono: ['"Courier Prime"', 'monospace'],
 },
 colors: {
 background: '#fdf9f4',
 surface: '#ffffff',
 'surface-variant': '#e6e2dd',
 primary: '#a7332d',
 'primary-container': '#c84b43',
 secondary: '#456274',
 tertiary: '#7b550a',
 ink: '#1c1c19',
 'on-background': '#1c1c19',
 'on-surface-variant': '#58413f'
 },
 boxShadow: {
 'retro': '4px 4px 0px #1c1c19',
 'retro-hover': '2px 2px 0px #1c1c19',
 'retro-sm': '2px 2px 0px #1c1c19',
 }
 }
 }
 }
 </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 selection:bg-primary btn-retro selection:text-white">
 <div class="max-w-md w-full bg-surface rounded-xl shadow-xl border border-slate-100 overflow-hidden">
 <div class="p-8">
 <div class="text-center mb-8">
 <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary btn-retro text-primary mb-6">
 <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
 </svg>
 </div>
 <h2 class="text-2xl font-bold text-on-background mb-2">Verify your email</h2>
 <p class="text-on-surface-variant text-sm" id="emailDisplay">
 We've sent a 6-digit verification code to your email.
 </p>
 </div>

 <form id="otpForm" class="space-y-6">
 <div>
 <label for="otp" class="sr-only">Verification Code</label>
 <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" class="block w-full text-center text-3xl tracking-[1em] py-4 border border-ink border-[3px] rounded-xl bg-background text-on-background placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-brand-500 transition-all input-retro rounded-lg " placeholder="••••••">
 </div>

 <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-retro text-sm font-medium text-white bg-primary btn-retro hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
 <span id="btnText">Verify Account</span>
 <svg id="btnSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
 <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
 <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
 </svg>
 </button>
 </form>

 <div class="mt-8 text-center">
 <p class="text-sm text-on-surface-variant mb-2">Didn't receive the code?</p>
 <button type="button" id="resendBtn" class="text-sm font-medium text-primary hover:text-primary transition-colors disabled:opacity-50">
 Resend Code
 </button>
 </div>
 </div>
 </div>

 <script>
 document.addEventListener('DOMContentLoaded', () => {
 const urlParams = new URLSearchParams(window.location.search);
 const email = urlParams.get('email');
 
 if (email) {
 document.getElementById('emailDisplay').innerHTML = `We've sent a 6-digit verification code to <span class="font-medium text-on-background">${email}</span>.`;
 } else {
 alert("Email not provided. Redirecting to login.");
 window.location.href ="login_page.html";
 }

 const otpInput = document.getElementById('otp');
 otpInput.addEventListener('input', (e) => {
 e.target.value = e.target.value.replace(/[^0-9]/g, '');
 });

 document.getElementById('otpForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const btnText = document.getElementById('btnText');
 const btnSpinner = document.getElementById('btnSpinner');
 const submitBtn = document.getElementById('submitBtn');

 submitBtn.disabled = true;
 btnText.textContent = 'Verifying...';
 btnSpinner.classList.remove('hidden');

 const otp = otpInput.value;

 try {
 const response = await fetch('http://localhost:5000/api/auth/verify-otp', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ email, otp })
 });

 const data = await response.json();

 if (response.ok) {
 window.location.href = 'login_page.html?verified=true';
 } else {
 throw new Error(data.message || data.error || 'Verification failed');
 }
 } catch (error) {
 alert(error.message);
 submitBtn.disabled = false;
 btnText.textContent = 'Verify Account';
 btnSpinner.classList.add('hidden');
 }
 });

 document.getElementById('resendBtn').addEventListener('click', async (e) => {
 const btn = e.target;
 btn.disabled = true;
 btn.textContent = 'Resending...';

 try {
 const response = await fetch('http://localhost:5000/api/auth/resend-verification', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ email })
 });

 const data = await response.json();

 if (response.ok) {
 alert(data.message || 'Verification code resent.');
 } else {
 alert(data.message || data.error || 'Failed to resend code.');
 }
 } catch (error) {
 alert('An error occurred while resending the code.');
 }

 btn.textContent = 'Resend Code';
 btn.disabled = false;
 });
 });
 </script>
</body>
</html>
